<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claire 活动日历</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", "微软雅黑", sans-serif; background: #e6e8eb; color: #2c2c2c; }

.topbar { background: #1e293b; color: #e2e8f0; padding: 0 24px; display: flex; align-items: center; height: 48px; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
.topbar .logo { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
.topbar .logo span { color: #60a5fa; }
.topbar .spacer { flex: 1; }
.topbar a { color: #e2e8f0; text-decoration: none; font-size: 13px; }

.main { max-width: 940px; margin: 0 auto; padding: 24px 16px 60px; }
.month-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
.month-header h2 { font-size: 22px; font-weight: 500; color: #1e293b; min-width: 140px; text-align: center; }
.month-header button { background: #fff; border: 1px solid #c8ccd4; border-radius: 6px; padding: 6px 16px; cursor: pointer; font-size: 16px; color: #475569; }
.month-header button:hover { background: #f1f5f9; }

.calendar { background: #fff; border-radius: 6px; overflow: hidden; border: 1px solid #d5d8dc; box-shadow: 0 1px 6px rgba(0,0,0,0.04); }
.weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
.weekdays div { padding: 10px; text-align: center; font-size: 12px; color: #64748b; font-weight: 500; }
.weekdays div:first-child, .weekdays div:last-child { color: #dc2626; }
.days { display: grid; grid-template-columns: repeat(7, 1fr); }
.day { min-height: 96px; padding: 6px; border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; position: relative; cursor: default; }
.day:nth-child(7n) { border-right: none; }
.day.other-month { background: #fafbfc; }
.day .date { font-size: 12px; color: #94a3b8; margin-bottom: 4px; padding: 2px 4px; }
.day.current-month .date { color: #334155; font-weight: 500; }
.day.today { background: #eff6ff; }
.day.today .date { color: #2563eb; font-weight: 700; }

.event-card { background: #2563eb; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event-card:hover { opacity: 0.85; }
.event-card.type-b { background: #475569; }

/* Detail panel */
.panel { background: #fff; border-radius: 6px; border: 1px solid #d5d8dc; margin-top: 18px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); display: none; }
.panel.open { display: block; }
.panel-header { padding: 14px 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
.panel-header h3 { font-size: 16px; font-weight: 500; }
.panel-body { padding: 20px; }
.field { display: flex; margin-bottom: 10px; align-items: flex-start; }
.field-lbl { width: 100px; font-size: 12px; color: #64748b; flex-shrink: 0; padding-top: 4px; }
.field-val { flex: 1; font-size: 14px; padding: 4px 0; color: #1e293b; }
.field-val.weather { color: #2563eb; }
.field-val.traffic { color: #92400e; }

.empty-hint { text-align: center; padding: 48px 20px; color: #b0b8c1; font-size: 14px; }

.btn { padding: 8px 20px; border: none; border-radius: 5px; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-share { background: #1e293b; color: #e2e8f0; }
.btn-share:hover { background: #0f172a; }
.btn-ghost { background: #fff; color: #475569; border: 1px solid #d0d3d8; }
.btn-ghost:hover { background: #f8fafc; }
.panel-actions { padding: 14px 20px; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
.share-box { display: none; }
.share-box.show { display: block; flex: 1; margin-right: 16px; }
.share-url { background: #f8fafc; border: 1px dashed #c8ccd4; padding: 8px 12px; border-radius: 5px; font-size: 12px; color: #64748b; word-break: break-all; font-family: monospace; }

@media (max-width: 640px) {
  .day { min-height: 64px; padding: 4px; }
  .event-card { font-size: 10px; padding: 2px 4px; }
  .panel-body { padding: 14px; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">Claire<span> 活动日历</span></span>
  <span class="spacer"></span>
  <a href="event-form-demo.html">+ 新建活动</a>
</div>

<div class="main">
  <div class="month-header">
    <button onclick="changeMonth(-1)">&lt;</button>
    <h2 id="monthTitle">2026年 7月</h2>
    <button onclick="changeMonth(1)">&gt;</button>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="panel" id="detailPanel">
    <div class="panel-header">
      <h3 id="panelTitle">活动详情</h3>
      <button class="btn btn-share" onclick="showShareLink()">分享链接</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
    <div class="panel-actions">
      <div class="share-box" id="shareBox">
        <div class="share-url" id="shareUrl"></div>
      </div>
      <button class="btn btn-ghost" onclick="closePanel()">关闭</button>
    </div>
  </div>

  <div class="empty-hint" id="emptyHint">点击日历上的活动查看详情，或点击右上角「新建活动」</div>
</div>

<script>
let currentYear = 2026, currentMonth = 7;
let selectedEventId = null;

let officialEvents = [
  { id: 'qianyuan-review-20260710', name: '"乾元"review', date: '2026-07-10', time: '15:00-16:00', location: '北京CMIT office S1212庐山会议室', audience: 'AI Lab Team', scale: '7人', weather: '北京7月10日（周五）阴转雷阵雨，24-32℃，东南风微风，降水概率约70%。（更新于7月7日）', traffic: '北京城区7月10日限行尾号5和0，有大型活动（鸟巢演唱会等），有交通管制（朝阳区管庄路施工禁行）。（更新于7月7日）' },
  { id: 'caipiao-lingjiang-20260717', name: '彩票中心领奖会议', date: '2026-07-17', time: '14:00-15:00', location: '北京市体彩中心', audience: '', scale: '2人', weather: '暂无预报数据（更新于7月6日）', traffic: '暂无交通信息（更新于7月7日）' }
];

function getLocalEvents() {
  try {
    var stored = JSON.parse(localStorage.getItem('claire_my_events') || '{}');
    return Object.values(stored);
  } catch(e) { return []; }
}

function getAllEvents() {
  // Merge official + local, local overrides official by id
  var map = {};
  officialEvents.forEach(function(e){ map[e.id] = e; });
  getLocalEvents().forEach(function(e){ map[e.id] = e; });
  return Object.values(map);
}

function buildCalendar() {
  var allEvents = getAllEvents();
  window._allEvents = allEvents;
  var cal = document.getElementById('calendar');
  var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  var html = '<div class="weekdays">';
  weekdays.forEach(function(d){ html += '<div>' + d + '</div>'; });
  html += '</div><div class="days">';

  var firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
  var daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  var today = new Date().toISOString().slice(0,10);

  for (var i = 0; i < firstDay; i++) {
    html += '<div class="day other-month"><div class="date"></div></div>';
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = currentYear + '-' + String(currentMonth).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var isToday = dateStr === today;
    var dayEvents = allEvents.filter(function(e){ return e.date === dateStr; });
    html += '<div class="day current-month' + (isToday ? ' today' : '') + '">';
    html += '<div class="date">' + d + (isToday ? ' 今天' : '') + '</div>';
    dayEvents.forEach(function(ev){
      var cls = ev.id.indexOf('caipiao') >= 0 ? 'type-b' : '';
      html += '<div class="event-card ' + cls + '" onclick="openEvent(\'' + ev.id + '\')">' + ev.name + '</div>';
    });
    html += '</div>';
  }

  html += '</div>';
  cal.innerHTML = html;
}

function openEvent(id) {
  selectedEventId = id;
  var allEvents = getAllEvents();
  var ev = allEvents.find(function(e){ return e.id === id; });
  if (!ev) return;
  document.getElementById('panelTitle').textContent = ev.name;
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('emptyHint').style.display = 'none';
  document.getElementById('shareBox').classList.remove('show');

  document.getElementById('panelBody').innerHTML =
    '<div class="field"><div class="field-lbl">日期</div><div class="field-val">' + esc(ev.date) + ' ' + esc(ev.time) + '</div></div>' +
    '<div class="field"><div class="field-lbl">地点</div><div class="field-val">' + esc(ev.location) + '</div></div>' +
    '<div class="field"><div class="field-lbl">受众</div><div class="field-val">' + (ev.audience ? esc(ev.audience) : '<span style="color:#ccc;">—</span>') + '</div></div>' +
    '<div class="field"><div class="field-lbl">规模</div><div class="field-val">' + esc(ev.scale) + '</div></div>' +
    '<div class="field"><div class="field-lbl">目的地天气</div><div class="field-val weather">' + esc(ev.weather) + '</div></div>' +
    '<div class="field"><div class="field-lbl">出行提示</div><div class="field-val traffic">' + esc(ev.traffic) + '</div></div>';
}

function showShareLink() {
  if (!selectedEventId) return;
  var box = document.getElementById('shareBox');
  box.classList.toggle('show');
  if (box.classList.contains('show')) {
    var allEvents = getAllEvents();
    var ev = allEvents.find(function(e){ return e.id === selectedEventId; });
    document.getElementById('shareUrl').textContent = window.location.origin + window.location.pathname + '?event=' + ev.id;
  }
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedEventId = null;
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  document.getElementById('monthTitle').textContent = currentYear + '年 ' + currentMonth + '月';
  buildCalendar();
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

buildCalendar();
document.getElementById('monthTitle').textContent = currentYear + '年 ' + currentMonth + '月';
</script>
</body>
</html>
